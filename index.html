<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <main id="container">
        <section id="wrapper-display">
            <div id="primary-display">1235</div>
            <div id="secondary-display">1234</div>
        </section>
        <section id="button">
            <button id="clear" class="button">C</button>
            <button id="clear-all" class="button">CA</button>
            <button id="multiplication" class="button">X</button>
            <button id="distribution" class="button">/</button>

            <button class="button number">7</button>
            <button class="button number">8</button>
            <button class="button number">9</button>
            <button id="addition" class="button">+</button>

            <button class="button number">4</button>
            <button class="button number">5</button>
            <button class="button number">6</button>
            <button id="substraction" class="button">-</button>

            <button class="button number">1</button>
            <button class="button number">2</button>
            <button class="button number">3</button>
            <button id="percent" class="button">%</button>

            <button id="dot" class="button">.</button>
            <button class="button number">0</button>
            <button id="exponent" class="button">A <sup>a</sup></button>
            <button id="result" class="button">=</button>
        </section>
    </main>



    <script src="scripts.js"></script>
</body>
</html>
